<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lekey - 内容后台</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --card: #16161a;
      --border: #2a2a30;
      --text: #f2f2f3;
      --muted: #9ca3af;
      --accent: #ff5500;
      --accent-2: #ff8c42;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    h1 { font-size: 26px; margin-bottom: 6px; }
    .sub { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .token-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .token-box input {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 12px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer;
      font-weight: 600; font-size: 14px; transition: opacity .2s;
    }
    .btn:hover { opacity: .9; }
    .btn.secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .tab { background: transparent; border: none; color: var(--muted); padding: 8px 12px; cursor: pointer; font-size: 15px; }
    .tab.active { color: var(--text); border-bottom: 2px solid var(--accent); }
    .item {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
    }
    .item h3 { margin: 0 0 4px; font-size: 16px; }
    .item .meta { font-size: 13px; color: var(--muted); }
    .item .actions { display: flex; gap: 8px; }
    .editor {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
    }
    .editor label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
    .editor input, .editor textarea, .editor select {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px;
    }
    .editor textarea { min-height: 300px; font-family: ui-monospace, SFMono-Regular, monospace; resize: vertical; }
    .editor .actions { display: flex; gap: 10px; margin-top: 20px; }
    .hidden { display: none !important; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert.error { background: rgba(239, 68, 68, .15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, .3); }
    .alert.success { background: rgba(34, 197, 94, .15); color: #86efac; border: 1px solid rgba(34, 197, 94, .3); }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>lekey 内容后台</h1>
    <div class="sub">管理博客、播客和站点设置</div>

    <div id="tokenBox" class="token-box">
      <label style="font-size:14px; font-weight:600; display:block; margin-bottom:8px;">GitHub Personal Access Token</label>
      <input id="tokenInput" type="password" placeholder="ghp_..." autocomplete="off">
      <div>
        <button class="btn" onclick="saveToken()">保存并登录</button>
        <button class="btn secondary" onclick="clearToken()">清除</button>
      </div>
    </div>

    <div id="mainArea" class="hidden">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('blog')">博客</button>
        <button class="tab" onclick="switchTab('podcast')">播客</button>
        <button class="tab" onclick="switchTab('settings')">站点设置</button>
      </div>
      <div id="msg"></div>
      <div id="listArea"></div>
      <div id="editorArea" class="hidden"></div>
    </div>
  </div>

  <script>
    const REPO = 'Luoan0712/admin-mini';
    const BRANCH = 'main';
    const BASE_URL = 'https://api.github.com';
    let token = localStorage.getItem('lekey_admin_token') || '';
    let currentTab = 'blog';
    let currentSha = null;
    let currentPath = null;

    const templates = {
      blog: `---
title: "新文章"
date: "{{date}}"
excerpt: ""
---

正文`,
      podcast: `---
title: "新节目"
date: "{{date}}"
duration: "15:00"
color: "linear-gradient(135deg, #ff5500, #ff8855)"
description: ""
---

节目介绍`
    };

    function today() { return new Date().toISOString().split('T')[0]; }

    if (token) {
      document.getElementById('tokenInput').value = token;
      document.getElementById('tokenBox').classList.add('hidden');
      document.getElementById('mainArea').classList.remove('hidden');
      loadList();
    }

    function saveToken() {
      token = document.getElementById('tokenInput').value.trim();
      if (!token) return;
      localStorage.setItem('lekey_admin_token', token);
      document.getElementById('tokenBox').classList.add('hidden');
      document.getElementById('mainArea').classList.remove('hidden');
      loadList();
    }

    function clearToken() {
      localStorage.removeItem('lekey_admin_token');
      token = '';
      document.getElementById('tokenInput').value = '';
      document.getElementById('mainArea').classList.add('hidden');
      document.getElementById('tokenBox').classList.remove('hidden');
    }

    async function request(path, opts = {}) {
      const res = await fetch(BASE_URL + path, {
        ...opts,
        headers: {
          'Accept': 'application/vnd.github+json',
          'Authorization': 'Bearer ' + token,
          'X-GitHub-Api-Version': '2022-11-28',
          ...opts.headers
        }
      });
      const text = await res.text();
      if (!res.ok) throw new Error(text || res.statusText);
      return text ? JSON.parse(text) : null;
    }

    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.innerHTML = '<div class="alert ' + type + '">' + text + '</div>';
      setTimeout(() => m.innerHTML = '', 4000);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => {
        const map = ['blog', 'podcast', 'settings'];
        t.classList.toggle('active', map[i] === tab);
      });
      document.getElementById('editorArea').classList.add('hidden');
      document.getElementById('listArea').classList.remove('hidden');
      loadList();
    }

    async function loadList() {
      const area = document.getElementById('listArea');
      area.innerHTML = '<div class="item">加载中 <span class="spinner"></span></div>';
      try {
        if (currentTab === 'settings') {
          renderSettings();
          return;
        }
        const folder = currentTab === 'blog' ? 'content/blog' : 'content/podcast';
        const items = await request('/repos/' + REPO + '/contents/' + folder + '?ref=' + BRANCH);
        if (!Array.isArray(items)) throw new Error('目录读取失败');
        items.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
        area.innerHTML = '<div class="item" style="justify-content:flex-end"><button class="btn" onclick="createNew()">+ 新建</button></div>' + items.map(it => `
          <div class="item">
            <div>
              <h3>${it.name}</h3>
              <div class="meta">${(it.size / 1024).toFixed(1)} KB · 更新于 ${new Date(it.sha).toLocaleString()}</div>
            </div>
            <div class="actions">
              <button class="btn secondary" onclick="editFile('${it.path}', '${it.sha}')">编辑</button>
              <button class="btn secondary" onclick="deleteFile('${it.path}', '${it.sha}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        area.innerHTML = '<div class="item" style="color:#fca5a5">加载失败：' + e.message + '</div>';
      }
    }

    function renderSettings() {
      const area = document.getElementById('listArea');
      area.innerHTML = '<div class="item" style="justify-content:flex-end"><button class="btn" onclick="editSettings()">编辑个人资料</button></div><div class="item">profile.json · 站点标题、头像、邮箱等</div>';
    }

    function b64Decode(str) {
      var binary = atob(str.replace(/\s/g, ''));
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
      return new TextDecoder('utf-8').decode(bytes);
    }

    function b64Encode(str) {
      var bytes = new TextEncoder().encode(str);
      var binary = '';
      for (var i = 0; i < bytes.length; i++) { binary += String.fromCharCode(bytes[i]); }
      return btoa(binary);
    }

    async function editSettings() {
      const path = 'content/settings/profile.json';
      const data = await request('/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH);
      const content = b64Decode(data.content);
      openEditor('settings', path, data.sha, content, true);
    }

    function createNew() {
      const date = today();
      const folder = currentTab === 'blog' ? 'content/blog' : 'content/podcast';
      const path = folder + '/' + date + '-' + (currentTab === 'blog' ? 'new-post' : 'new-episode') + '.md';
      const content = templates[currentTab].replace('{{date}}', date);
      openEditor(currentTab, path, null, content, false);
    }

    async function editFile(path, sha) {
      const data = await request('/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH);
      const content = b64Decode(data.content);
      openEditor(currentTab, path, sha, content, false);
    }

    function openEditor(type, path, sha, content, isJson) {
      currentPath = path;
      currentSha = sha;
      document.getElementById('listArea').classList.add('hidden');
      const area = document.getElementById('editorArea');
      area.classList.remove('hidden');
      area.innerHTML = `
        <div class="editor">
          <div style="margin-bottom:12px; font-size:13px; color:var(--muted)">${path}</div>
          <textarea id="editorContent">${escapeHtml(content)}</textarea>
          <div class="actions">
            <button class="btn" onclick="saveFile()">保存</button>
            <button class="btn secondary" onclick="cancelEdit()">取消</button>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function cancelEdit() {
      document.getElementById('editorArea').classList.add('hidden');
      document.getElementById('listArea').classList.remove('hidden');
      currentPath = null; currentSha = null;
    }

    async function rebuildManifest() {
      try {
        var blogItems = await request('/repos/' + REPO + '/contents/content/blog?ref=' + BRANCH);
        var podcastItems = await request('/repos/' + REPO + '/contents/content/podcast?ref=' + BRANCH);
        var manifest = {
          blog: (Array.isArray(blogItems) ? blogItems : []).map(function(f) { return f.path; }),
          podcast: (Array.isArray(podcastItems) ? podcastItems : []).map(function(f) { return f.path; })
        };
        var path = 'content/manifest.json';
        var existing = null;
        try {
          var data = await request('/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH);
          existing = data;
        } catch(e) {}
        var body = {
          message: 'Update manifest',
          content: b64Encode(JSON.stringify(manifest, null, 2)),
          branch: BRANCH
        };
        if (existing && existing.sha) body.sha = existing.sha;
        await request('/repos/' + REPO + '/contents/' + path, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch(e) { console.error('Manifest sync failed:', e); }
    }

    async function saveFile() {
      const content = document.getElementById('editorContent').value;
      const body = {
        message: currentSha ? 'Update ' + currentPath : 'Create ' + currentPath,
        content: b64Encode(content),
        branch: BRANCH
      };
      if (currentSha) body.sha = currentSha;
      try {
        await request('/repos/' + REPO + '/contents/' + currentPath, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        localStorage.setItem('lekey_file_' + currentPath, content);
        showMsg('保存成功 ✓', 'success');
        cancelEdit();
        loadList();
        rebuildManifest();
      } catch (e) {
        showMsg('保存失败：' + e.message, 'error');
      }
    }

    async function deleteFile(path, sha) {
      if (!confirm('确定删除 ' + path + '？')) return;
      try {
        await request('/repos/' + REPO + '/contents/' + path, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Delete ' + path, sha: sha, branch: BRANCH })
        });
        showMsg('已删除', 'success');
        loadList();
        rebuildManifest();
      } catch (e) {
        showMsg('删除失败：' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
